<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Automation Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <header class="topbar">
    <h1>Email Automation Dashboard</h1>
    <div class="gmail-status">
      <span id="gmailStatusBadge" class="badge badge-unknown">Checking…</span>
      <button id="connectGmailBtn" class="btn">Connect Gmail</button>
    </div>
  </header>

  <main>
    <div class="range-switch" role="tablist" aria-label="Time range">
      <button class="range-btn is-active" data-range="week">Week</button>
      <button class="range-btn" data-range="month">Month</button>
      <button class="range-btn" data-range="year">Year</button>
    </div>

    <section class="cards">
      <article class="card">
        <p class="card-label">Invoices processed</p>
        <p class="card-value" id="statInvoices">–</p>
      </article>
      <article class="card">
        <p class="card-label">Emails replied</p>
        <p class="card-value" id="statReplied">–</p>
      </article>
      <article class="card">
        <p class="card-label">Emails forwarded for review</p>
        <p class="card-value" id="statForwarded">–</p>
      </article>
    </section>

    <section class="chart-section">
      <canvas id="statsChart" height="120"></canvas>
    </section>

    <p id="errorBanner" class="error-banner" hidden></p>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
